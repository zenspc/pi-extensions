name: Release PR

on:
  push:
    branches:
      - master
      - main

concurrency:
  group: release-pr-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN cannot open PRs when the repo restricts Actions from creating PRs.
# Use a personal access token (repo secret RELEASE_TOKEN) with contents + pull-requests
# (and workflows if this job dispatches publish.yml). See docs/publishing.md.
permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  version-and-tag:
    name: Version packages PR and tags
    runs-on: ubuntu-latest
    steps:
      - name: Require RELEASE_TOKEN
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "${RELEASE_TOKEN}" ]; then
            echo "::error::Missing repository secret RELEASE_TOKEN."
            echo "Create a PAT that can open PRs and push tags, then add it as RELEASE_TOKEN."
            echo "See docs/publishing.md."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT so subsequent git push / PR create are not limited to GITHUB_TOKEN rules
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable corepack
        run: corepack enable

      - name: Install pnpm from packageManager
        run: corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update Version packages PR
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          title: Version packages
          commit: "chore: version packages"
          createGithubReleases: false
        env:
          # changesets/action reads GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create missing package tags and dispatch publish
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          # tag-packages prints one tag per line; ignore non-tag footer lines
          node scripts/tag-packages.mjs | grep -E '^@zenspc/' || true
          while IFS= read -r TAG; do
            [ -n "${TAG}" ] || continue
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "Tag already exists: ${TAG}"
              continue
            fi
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "refs/tags/${TAG}"
            # Tag pushes from GITHUB_TOKEN do not start other workflows; PAT + dispatch does.
            gh workflow run publish.yml -f "tag=${TAG}" -f dry_run=false || true
            echo "Tagged and dispatched publish for ${TAG}"
          done < <(node scripts/tag-packages.mjs | grep -E '^@zenspc/' || true)
