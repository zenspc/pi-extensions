name: Release PR

on:
  push:
    branches:
      - master
      - main

concurrency:
  group: release-pr-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN cannot open PRs when the repo restricts Actions from creating PRs.
# Use a personal access token (repo secret RELEASE_TOKEN) with contents + pull-requests.
# Tag pushes with that PAT start publish.yml (GITHUB_TOKEN tag pushes do not). See docs/publishing.md.
permissions:
  contents: write
  pull-requests: write

jobs:
  version-and-tag:
    name: Version packages PR and tags
    runs-on: ubuntu-latest
    steps:
      - name: Require RELEASE_TOKEN
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "${RELEASE_TOKEN}" ]; then
            echo "::error::Missing repository secret RELEASE_TOKEN."
            echo "Create a PAT that can open PRs and push tags, then add it as RELEASE_TOKEN."
            echo "See docs/publishing.md."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT so subsequent git push / PR create are not limited to GITHUB_TOKEN rules
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable corepack
        run: corepack enable

      - name: Install pnpm from packageManager
        run: corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update Version packages PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          title: Version packages
          commit: "chore: version packages"
          createGithubReleases: false
        env:
          # changesets/action reads GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      # Tag only after versions have landed on the default branch.
      # When hasChangesets=true, changesets/action just opened/updated a Version PR and left
      # the worktree on changeset-release/<branch> with bumps applied - tagging then would
      # publish unmerged version commits and skip the intentional Version PR gate.
      - name: Create missing package tags
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          DEFAULT_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # changesets/action may leave us on changeset-release/*; always tag the push commit.
          git fetch origin "$DEFAULT_BRANCH" --tags
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          # tag-packages prints one tag per line; ignore non-tag footer lines
          mapfile -t TAGS < <(node scripts/tag-packages.mjs | grep -E '^@zenspc/' || true)
          if [ "${#TAGS[@]}" -eq 0 ]; then
            echo "No missing package tags"
            exit 0
          fi

          for TAG in "${TAGS[@]}"; do
            [ -n "${TAG}" ] || continue
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "Tag already exists: ${TAG}"
              continue
            fi
            git tag -a "${TAG}" -m "Release ${TAG}"
            # RELEASE_TOKEN is a PAT, so the tag push triggers publish.yml once.
            # Do not also gh workflow run - that double-fires publish and races on npm.
            git push origin "refs/tags/${TAG}"
            echo "Tagged ${TAG} (publish.yml will run from the tag push)"
          done

      - name: Skip tagging while Version PR is open
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          echo "Pending changesets: Version packages PR opened/updated."
          echo "Tags and publish run only after that PR merges onto ${{ github.ref_name }}."
