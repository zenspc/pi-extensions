name: Release PR

on:
  push:
    branches:
      - master
      - main

concurrency:
  group: release-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  version-and-tag:
    name: Version packages PR and tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable corepack
        run: corepack enable

      - name: Install pnpm from packageManager
        run: corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update Version packages PR
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          title: Version packages
          commit: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create missing package tags and dispatch publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          # tag-packages prints one tag per line; ignore non-tag footer lines
          node scripts/tag-packages.mjs | grep -E '^@zenspc/' || true
          while IFS= read -r TAG; do
            [ -n "${TAG}" ] || continue
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "Tag already exists: ${TAG}"
              continue
            fi
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "refs/tags/${TAG}"
            gh workflow run publish.yml -f "tag=${TAG}" -f dry_run=false || true
            echo "Tagged and dispatched publish for ${TAG}"
          done < <(node scripts/tag-packages.mjs | grep -E '^@zenspc/' || true)
