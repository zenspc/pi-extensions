name: Bug report
description: Report a problem with one of the packages in this monorepo
title: "[bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - pi-safety
        - pi-workflow
        - pi-devtools
        - pi-preferred-thinking
        - pi-copilot-discovery
        - pi-spinner
        - pi-quiet
        - pi-sticky-editor
        - monorepo
    validations:
      required: true
  - type: input
    id: pi_version
    attributes:
      label: Pi version
      description: Output of `pi --version` if available
      placeholder: e.g. 0.x.y
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reproduce the issue
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant logs or error output.
        Redact tokens, API keys, and paths that contain secrets.
      render: shell
    validations:
      required: false
