name: Feature request
description: Suggest an improvement or new capability
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package should this target?
      options:
        - pi-safety
        - pi-workflow
        - pi-devtools
        - pi-preferred-thinking
        - pi-copilot-discovery
        - pi-spinner
        - pi-quiet
        - pi-sticky-editor
        - monorepo
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any
    validations:
      required: false
